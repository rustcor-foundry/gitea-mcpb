name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v). Used for manual dry runs."
        required: true
        default: "1.3.0"

# Concurrency: don't run two release builds for the same tag in parallel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# TLS shortcut: the W-Sky CA isn't in the runners' Node trust store, so
# Node-based actions (upload/download-artifact) fail with "unable to get
# local issuer certificate" when talking to gitea.w-sky.net. Disable TLS
# verification at the Node layer for the whole workflow. Safe because every
# host we contact is gitea.w-sky.net (which we control); we accept the MITM
# risk this opens on that connection only.
#
# TODO: install the W-Sky root CA into each runner's NODE_EXTRA_CA_CERTS
# (or system CA bundle) and remove this. Tracked in Issues.
env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Fetch upstream binaries (linux runner; bash + curl + standard tools).
  #
  # Versioning has two axes:
  #   - upstream_version: the gitea-mcp release we wrap. Read from
  #     manifest.json. Must match a real upstream release tag.
  #   - bundle_version: our release tag (may include pre-release suffix like
  #     -rc1 or build metadata like +pkg.1). Used only in artifact filenames
  #     and in the substituted manifest version field.
  # ---------------------------------------------------------------------------
  fetch-upstream:
    runs-on: [self-hosted, linux]
    outputs:
      upstream_version: ${{ steps.version.outputs.upstream_version }}
      bundle_version:   ${{ steps.version.outputs.bundle_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: version
        run: |
          # upstream version from manifest (source of truth)
          UPSTREAM="$(python3 -c 'import json; print(json.load(open("manifest.json"))["version"])')"
          # bundle version from tag (or workflow_dispatch input for manual runs)
          if [ -n "${{ inputs.version }}" ]; then
            BUNDLE="${{ inputs.version }}"
          else
            BUNDLE="${GITHUB_REF_NAME#v}"
          fi
          echo "upstream_version=$UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "bundle_version=$BUNDLE"     >> "$GITHUB_OUTPUT"
          echo "==> upstream: $UPSTREAM"
          echo "==> bundle:   $BUNDLE"

      - name: Fetch + verify upstream binaries
        run: |
          chmod +x scripts/fetch-upstream.sh
          ./scripts/fetch-upstream.sh "${{ steps.version.outputs.upstream_version }}"

      - name: Upload upstream binaries as artifact
        uses: actions/upload-artifact@v3
        with:
          name: upstream-binaries
          path: dist-cache/extract-*/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Build freebsd-amd64 from source (upstream doesn't ship a FreeBSD binary).
  # ---------------------------------------------------------------------------
  build-freebsd:
    runs-on: [self-hosted, freebsd]
    needs: fetch-upstream
    steps:
      - uses: actions/checkout@v4

      - name: Build from source
        run: |
          chmod +x scripts/build-from-source-freebsd.sh
          ./scripts/build-from-source-freebsd.sh "${{ needs.fetch-upstream.outputs.upstream_version }}"

      - name: Upload freebsd binary as artifact
        uses: actions/upload-artifact@v3
        with:
          name: upstream-freebsd-amd64
          path: dist-cache/extract-freebsd-amd64/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Native smoke-test on each platform we have a runner for.
  #    Skipped platforms (linux-arm64, win-arm64) are shipped unverified.
  # ---------------------------------------------------------------------------
  smoke-test:
    needs: [fetch-upstream, build-freebsd]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs-on: [self-hosted, linux]
            binary: gitea-mcp
            shell: bash
          - target: windows-amd64
            runs-on: [self-hosted, windows]
            binary: gitea-mcp.exe
            shell: pwsh
          - target: darwin-arm64
            runs-on: [macos-arm64]
            binary: gitea-mcp
            shell: bash
          - target: darwin-amd64
            runs-on: [macos-arm64]   # Rosetta — same Mac mini
            binary: gitea-mcp
            shell: bash
          - target: freebsd-amd64
            runs-on: [self-hosted, freebsd]
            binary: gitea-mcp
            shell: bash
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact for this platform
        uses: actions/download-artifact@v3
        with:
          name: ${{ matrix.target == 'freebsd-amd64' && 'upstream-freebsd-amd64' || 'upstream-binaries' }}
          path: ./_artifact

      - name: Locate binary
        id: locate
        shell: ${{ matrix.shell }}
        run: |
          if [ "${{ matrix.shell }}" = "pwsh" ]; then exit 0; fi
          # bash branch
          if [ "${{ matrix.target }}" = "freebsd-amd64" ]; then
            BIN="$(pwd)/_artifact/${{ matrix.binary }}"
          else
            BIN="$(pwd)/_artifact/extract-${{ matrix.target }}/${{ matrix.binary }}"
          fi
          chmod +x "$BIN"
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      - name: Locate binary (windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $bin = Join-Path (Get-Location) "_artifact\extract-${{ matrix.target }}\${{ matrix.binary }}"
          echo "bin=$bin" >> $env:GITHUB_OUTPUT
        id: locate-win

      - name: Smoke-test (MCP handshake)
        shell: ${{ matrix.shell }}
        run: |
          if [ "${{ matrix.shell }}" = "pwsh" ]; then exit 0; fi
          python3 scripts/smoke-test-mcp.py "${{ steps.locate.outputs.bin }}"

      - name: Smoke-test (MCP handshake, windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: python scripts/smoke-test-mcp.py "${{ steps.locate-win.outputs.bin }}"

  # ---------------------------------------------------------------------------
  # 4. Pack the .mcpb bundle (main + per-arch sidecars).
  # ---------------------------------------------------------------------------
  pack:
    needs: [fetch-upstream, build-freebsd, smoke-test]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v3
        with:
          name: upstream-binaries
          path: dist-cache/

      - uses: actions/download-artifact@v3
        with:
          name: upstream-freebsd-amd64
          path: dist-cache/extract-freebsd-amd64/

      - name: Build all bundles
        run: |
          chmod +x scripts/build-bundle.sh
          ./scripts/build-bundle.sh "${{ needs.fetch-upstream.outputs.bundle_version }}"

      - name: Upload bundles as artifact
        uses: actions/upload-artifact@v3
        with:
          name: mcpb-bundles
          path: dist/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # 5. Create the Gitea release and attach bundles.
  # ---------------------------------------------------------------------------
  release:
    needs: [fetch-upstream, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v3
        with:
          name: mcpb-bundles
          path: dist/

      - name: Detect prerelease (anything after a dash or plus is prerelease)
        id: prerel
        run: |
          TAG="${{ github.ref_name }}"
          case "$TAG" in
            *-*|*+*) echo "is_prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)       echo "is_prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create release and attach bundles
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_HOST: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          UPSTREAM: ${{ needs.fetch-upstream.outputs.upstream_version }}
          BUNDLE:   ${{ needs.fetch-upstream.outputs.bundle_version }}
          PRERELEASE: ${{ steps.prerel.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          # Create the release
          curl -fsS -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "$GITEA_HOST/api/v1/repos/$REPO/releases" \
            -d "$(jq -n \
                    --arg tag "$TAG" \
                    --arg name "gitea-mcpb $TAG" \
                    --arg body "Wraps upstream gitea-mcp v$UPSTREAM. Bundle version $BUNDLE. See README for install paths." \
                    --argjson prerelease "$PRERELEASE" \
                    '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:$prerelease}')" \
            > release.json
          RELEASE_ID="$(jq -r '.id' release.json)"
          echo "==> created release id=$RELEASE_ID (prerelease=$PRERELEASE)"

          # Attach each artifact
          for f in dist/*; do
            echo "==> attaching $(basename "$f")"
            curl -fsS -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "attachment=@$f" \
              "$GITEA_HOST/api/v1/repos/$REPO/releases/$RELEASE_ID/assets?name=$(basename "$f")"
          done
          echo "==> done"
