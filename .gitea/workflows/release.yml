name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v). Used for manual dry runs."
        required: true
        default: "1.3.0"

# Concurrency: re-tagging cancels any prior in-flight run for the same ref.
# (Useful during iteration; stale queued runs won't pile up on stuck runners.)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# TLS shortcut: the W-Sky CA isn't in the runners' Node trust store, so
# Node-based actions (upload/download-artifact) fail with "unable to get
# local issuer certificate" when talking to gitea.w-sky.net. Disable TLS
# verification at the Node layer for the whole workflow. Safe because every
# host we contact is gitea.w-sky.net (which we control); we accept the MITM
# risk this opens on that connection only.
#
# TODO: install the W-Sky root CA into each runner's NODE_EXTRA_CA_CERTS
# (or system CA bundle) and remove this. Tracked in Issues.
env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Fetch upstream binaries (linux runner; bash + curl + standard tools).
  #
  # Versioning has two axes:
  #   - upstream_version: the gitea-mcp release we wrap. Read from
  #     manifest.json. Must match a real upstream release tag.
  #   - bundle_version: our release tag (may include pre-release suffix like
  #     -rc1 or build metadata like +pkg.1). Used only in artifact filenames
  #     and in the substituted manifest version field.
  # ---------------------------------------------------------------------------
  fetch-upstream:
    runs-on: [self-hosted, linux]
    outputs:
      upstream_version: ${{ steps.version.outputs.upstream_version }}
      bundle_version:   ${{ steps.version.outputs.bundle_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: version
        run: |
          # upstream version from manifest (source of truth)
          UPSTREAM="$(python3 -c 'import json; print(json.load(open("manifest.json"))["version"])')"
          # bundle version from tag (or workflow_dispatch input for manual runs)
          if [ -n "${{ inputs.version }}" ]; then
            BUNDLE="${{ inputs.version }}"
          else
            BUNDLE="${GITHUB_REF_NAME#v}"
          fi
          echo "upstream_version=$UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "bundle_version=$BUNDLE"     >> "$GITHUB_OUTPUT"
          echo "==> upstream: $UPSTREAM"
          echo "==> bundle:   $BUNDLE"

      - name: Fetch + verify upstream binaries
        run: |
          chmod +x scripts/fetch-upstream.sh
          ./scripts/fetch-upstream.sh "${{ steps.version.outputs.upstream_version }}"

      - name: Upload upstream binaries as artifact
        uses: actions/upload-artifact@v3
        with:
          name: upstream-binaries
          path: dist-cache/extract-*/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Cross-compile freebsd-amd64 from source on the linux runner.
  #
  # Upstream doesn't publish a FreeBSD binary. Native build on bsd-ws01 would
  # be ideal but the FreeBSD runner doesn't have Node (required for any JS
  # action like actions/checkout). Cross-compile from the linux runner is the
  # quick fix — Go's GOOS=freebsd GOARCH=amd64 produces a clean static binary
  # since gitea-mcp doesn't use CGO.
  #
  # TODO: once bsd-ws01 has Node installed, move this back to a native build
  # AND add the freebsd smoke-test back to the matrix below.
  # ---------------------------------------------------------------------------
  build-freebsd:
    runs-on: [self-hosted, linux]
    needs: fetch-upstream
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Go is available
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cross-compile from source
        run: |
          chmod +x scripts/build-from-source-freebsd.sh
          ./scripts/build-from-source-freebsd.sh "${{ needs.fetch-upstream.outputs.upstream_version }}"

      - name: Upload freebsd binary as artifact
        uses: actions/upload-artifact@v3
        with:
          name: upstream-freebsd-amd64
          path: dist-cache/extract-freebsd-amd64/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Native smoke-test per platform.
  #
  # Originally a matrix job, but act-runner stringifies `${{ matrix.runs-on }}`
  # instead of expanding it as a YAML list, so the runner looks for a label
  # literally named "[self-hosted linux]". Split into one job per platform —
  # verbose but works on act-runner today.
  #
  # Skipped platforms (linux-arm64, win-arm64, freebsd-amd64) ship unverified
  # until we get runners for them.
  # ---------------------------------------------------------------------------
  smoke-linux-amd64:
    needs: [fetch-upstream, build-freebsd]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: upstream-binaries
          path: ./_artifact
      - name: MCP handshake
        run: |
          BIN="$(pwd)/_artifact/extract-linux-amd64/gitea-mcp"
          chmod +x "$BIN"
          python3 scripts/smoke-test-mcp.py "$BIN"

  smoke-windows-amd64:
    needs: [fetch-upstream, build-freebsd]
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: upstream-binaries
          path: ./_artifact
      - name: MCP handshake
        shell: pwsh
        run: |
          $bin = Join-Path (Get-Location) "_artifact\extract-win-amd64\gitea-mcp.exe"
          python scripts/smoke-test-mcp.py $bin

  smoke-darwin-arm64:
    needs: [fetch-upstream, build-freebsd]
    runs-on: [macos-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: upstream-binaries
          path: ./_artifact
      - name: MCP handshake
        run: |
          BIN="$(pwd)/_artifact/extract-darwin-arm64/gitea-mcp"
          chmod +x "$BIN"
          python3 scripts/smoke-test-mcp.py "$BIN"

  smoke-darwin-amd64-rosetta:
    needs: [fetch-upstream, build-freebsd]
    runs-on: [macos-arm64]  # same Mac mini, runs amd64 via Rosetta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: upstream-binaries
          path: ./_artifact
      - name: MCP handshake
        run: |
          BIN="$(pwd)/_artifact/extract-darwin-amd64/gitea-mcp"
          chmod +x "$BIN"
          python3 scripts/smoke-test-mcp.py "$BIN"

  # ---------------------------------------------------------------------------
  # 4. Pack the .mcpb bundle (main + per-arch sidecars).
  # ---------------------------------------------------------------------------
  pack:
    needs:
      - fetch-upstream
      - build-freebsd
      - smoke-linux-amd64
      - smoke-windows-amd64
      - smoke-darwin-arm64
      - smoke-darwin-amd64-rosetta
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v3
        with:
          name: upstream-binaries
          path: dist-cache/

      - uses: actions/download-artifact@v3
        with:
          name: upstream-freebsd-amd64
          path: dist-cache/extract-freebsd-amd64/

      - name: Build all bundles
        run: |
          chmod +x scripts/build-bundle.sh
          ./scripts/build-bundle.sh "${{ needs.fetch-upstream.outputs.bundle_version }}"

      - name: Upload bundles as artifact
        uses: actions/upload-artifact@v3
        with:
          name: mcpb-bundles
          path: dist/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # 5. Create the Gitea release and attach bundles.
  # ---------------------------------------------------------------------------
  release:
    needs: [fetch-upstream, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v3
        with:
          name: mcpb-bundles
          path: dist/

      - name: "Detect prerelease (semver: only '-' is prerelease; '+' is build metadata)"
        id: prerel
        run: |
          TAG="${{ github.ref_name }}"
          # Strip any build metadata (everything after '+') first, then check for '-'.
          BASE="${TAG%%+*}"
          case "$BASE" in
            *-*) echo "is_prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "is_prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create release and attach bundles
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_HOST: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          UPSTREAM: ${{ needs.fetch-upstream.outputs.upstream_version }}
          BUNDLE:   ${{ needs.fetch-upstream.outputs.bundle_version }}
          PRERELEASE: ${{ steps.prerel.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          # Build the JSON body with python (jq isn't on the minimal runner).
          BODY="$(python3 -c '
          import json, os
          print(json.dumps({
              "tag_name":   os.environ["TAG"],
              "name":       "gitea-mcpb " + os.environ["TAG"],
              "body":       "Wraps upstream gitea-mcp v{u}. Bundle version {b}. See README for install paths.".format(
                                u=os.environ["UPSTREAM"], b=os.environ["BUNDLE"]),
              "draft":      False,
              "prerelease": os.environ["PRERELEASE"] == "true",
          }))
          ')"

          # Idempotent create: if release already exists for this tag (from a
          # prior partial run), fetch its id; otherwise create. Either path
          # ends with RELEASE_ID set.
          set +e
          EXISTING="$(curl -fsS -H "Authorization: token $GITEA_TOKEN" \
                       "$GITEA_HOST/api/v1/repos/$REPO/releases/tags/$TAG" 2>/dev/null)"
          EXISTING_RC=$?
          set -e
          if [ $EXISTING_RC -eq 0 ] && [ -n "$EXISTING" ]; then
            RELEASE_ID="$(echo "$EXISTING" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
            echo "==> existing release found, id=$RELEASE_ID; will replace its assets"
            # Clear existing assets to avoid name collisions on re-upload
            ASSETS="$(curl -fsS -H "Authorization: token $GITEA_TOKEN" \
                        "$GITEA_HOST/api/v1/repos/$REPO/releases/$RELEASE_ID/assets")"
            echo "$ASSETS" | python3 -c '
          import sys, json
          for a in json.load(sys.stdin): print(a["id"])
          ' | while read -r AID; do
              [ -n "$AID" ] && curl -fsS -X DELETE \
                -H "Authorization: token $GITEA_TOKEN" \
                "$GITEA_HOST/api/v1/repos/$REPO/releases/$RELEASE_ID/assets/$AID"
            done
          else
            RESPONSE="$(curl -fsS -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "$GITEA_HOST/api/v1/repos/$REPO/releases")"
            RELEASE_ID="$(echo "$RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
            echo "==> created release id=$RELEASE_ID (prerelease=$PRERELEASE)"
          fi

          # Attach each artifact
          for f in dist/*; do
            echo "==> attaching $(basename "$f")"
            curl -fsS -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "attachment=@$f" \
              "$GITEA_HOST/api/v1/repos/$REPO/releases/$RELEASE_ID/assets?name=$(basename "$f")"
          done
          echo "==> done"
